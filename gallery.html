<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeri Aktivitas — Velsamen 2026</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/vendor/bootstrap-icons/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/gallery.css">
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar-placeholder"></div>

  <!-- =========================================================
       PAGE HERO
  ========================================================== -->
  <section class="gallery-hero">
    <div class="container">
      <p class="section-label mb-2">Dokumentasi Visual</p>
      <span class="accent-line mb-3"></span>
      <h1 class="page-hero-title">
        Galeri<br><span style="color:var(--clr-accent);">Aktivitas</span>
      </h1>
    </div>
  </section>

  <!-- =========================================================
       FILTER NAV
  ========================================================== -->
  <div class="gallery-filter-section">
    <div class="container">
      <div class="d-flex flex-wrap justify-content-center gap-2">
        <button class="filter-btn active" data-filter="all">Semua</button>
        <button class="filter-btn" data-filter="event">Event Sekolah</button>
        <button class="filter-btn" data-filter="kelas">Kegiatan Kelas</button>
        <button class="filter-btn" data-filter="sosial">Sosial</button>
        <button class="filter-btn" data-filter="wisuda">Wisuda &amp; Perpisahan</button>
      </div>
    </div>
  </div>

  <!-- =========================================================
       BENTO GALLERY GRID
  ========================================================== -->
  <section class="gallery-grid-section section-padding">
    <div class="container-fluid px-3 px-md-4">

      <!-- Row 1 -->
      <div class="gallery-bento mb-1">
        <a class="g-item lightbox-target span-2 tall" href="assets/img/temp/temp_img.jpg" data-cat="event">
          <img src="assets/img/temp/temp_img.jpg" alt="Event Sekolah">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
        <a class="g-item lightbox-target span-2 tall" href="assets/img/temp/temp_img.jpg" data-cat="kelas">
          <img src="assets/img/temp/temp_img.jpg" alt="Kegiatan Kelas">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
        <a class="g-item lightbox-target span-2 tall" href="assets/img/temp/temp_img.jpg" data-cat="sosial">
          <img src="assets/img/temp/temp_img.jpg" alt="Kegiatan Sosial">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
      </div>

      <!-- Row 2 -->
      <div class="gallery-bento mb-1">
        <a class="g-item lightbox-target span-3 medium" href="assets/img/temp/temp_img.jpg" data-cat="wisuda">
          <img src="assets/img/temp/temp_img.jpg" alt="Wisuda">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
        <a class="g-item lightbox-target span-3 medium" href="assets/img/temp/temp_img.jpg" data-cat="event">
          <img src="assets/img/temp/temp_img.jpg" alt="Event">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
        <a class="g-item lightbox-target span-3 medium" href="assets/img/temp/temp_img.jpg" data-cat="kelas">
          <img src="assets/img/temp/temp_img.jpg" alt="Kelas">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
        <a class="g-item lightbox-target span-3 medium" href="assets/img/temp/temp_img.jpg" data-cat="sosial">
          <img src="assets/img/temp/temp_img.jpg" alt="Sosial">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
      </div>

      <!-- Row 3: Wide banner -->
      <div class="gallery-bento mb-1">
        <a class="g-item lightbox-target span-12 short" href="assets/img/temp/temp_img.jpg" data-cat="event">
          <img src="assets/img/temp/temp_img.jpg" alt="Foto Bersama" style="object-position:center 30%;">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
      </div>

      <!-- Row 4 -->
      <div class="gallery-bento mb-1">
        <a class="g-item lightbox-target span-4 medium" href="assets/img/temp/temp_img.jpg" data-cat="kelas">
          <img src="assets/img/temp/temp_img.jpg" alt="Kelas">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
        <a class="g-item lightbox-target span-4 medium" href="assets/img/temp/temp_img.jpg" data-cat="wisuda">
          <img src="assets/img/temp/temp_img.jpg" alt="Wisuda">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
        <a class="g-item lightbox-target span-4 medium" href="assets/img/temp/temp_img.jpg" data-cat="event">
          <img src="assets/img/temp/temp_img.jpg" alt="Event">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
        <a class="g-item lightbox-target span-4 medium" href="assets/img/temp/temp_img.jpg" data-cat="sosial">
          <img src="assets/img/temp/temp_img.jpg" alt="Sosial">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
      </div>

      <!-- Row 5 -->
      <div class="gallery-bento">
        <a class="g-item lightbox-target span-2 tall" href="assets/img/temp/temp_img.jpg" data-cat="wisuda">
          <img src="assets/img/temp/temp_img.jpg" alt="Wisuda">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
        <a class="g-item lightbox-target span-2 tall" href="assets/img/temp/temp_img.jpg" data-cat="kelas">
          <img src="assets/img/temp/temp_img.jpg" alt="Kelas">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
        <a class="g-item lightbox-target span-2 tall" href="assets/img/temp/temp_img.jpg" data-cat="event">
          <img src="assets/img/temp/temp_img.jpg" alt="Event">
          <div class="g-item-overlay"><i class="bi bi-zoom-in"></i></div>
        </a>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- SCRIPTS -->
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/gallery.js"></script>
</body>
</html>
